# Weekly re-measurement of the byte savings vs the hosted Linear MCP.
# Deliberately commits NOTHING: the trim ratios only move when code moves
# (ours or Linear's), so a weekly README commit would be pure churn. Instead
# the run publishes the table to its step summary and FAILS when the aggregate
# saving falls below the floor — the README badge turning red is the alarm.
# The committed README table is refreshed by hand when it meaningfully changes:
#   node probe-vs-hosted.mjs | tee /tmp/savings.txt   (env in the file header)
#   node scripts/update-readme-savings.mjs /tmp/savings.txt
#
# Needs a live deploy + repo secrets (see probe-vs-hosted.mjs header):
#   WRAPPER_URL, MCP_BEARER_TOKEN, LINEAR_API_KEY,
#   PROBE_PROJECT_ID, PROBE_PROJECT, PROBE_ISSUE_ID, PROBE_TEAM
# Without WRAPPER_URL the run skips the measurement instead of failing, so the
# workflow is safe to keep enabled on forks/clones.
name: probe-vs-hosted

on:
  schedule:
    - cron: "17 5 * * 1" # Mondays 05:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  measure:
    runs-on: ubuntu-latest
    env:
      # Alarm floor for the aggregate save% (last committed measurement: 62.8%
      # on 2026-07-07). A drop below this means a trim regression somewhere —
      # in this wrapper or in the hosted MCP's payloads.
      SAVINGS_FLOOR: "55"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check deploy secrets
        id: gate
        env:
          WRAPPER_URL: ${{ secrets.WRAPPER_URL }}
        run: |
          if [ -z "$WRAPPER_URL" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "WRAPPER_URL secret not set — skipping measurement" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Measure vs hosted
        if: steps.gate.outputs.present == 'true'
        env:
          WRAPPER_URL: ${{ secrets.WRAPPER_URL }}
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          PROBE_PROJECT_ID: ${{ secrets.PROBE_PROJECT_ID }}
          PROBE_PROJECT: ${{ secrets.PROBE_PROJECT }}
          PROBE_ISSUE_ID: ${{ secrets.PROBE_ISSUE_ID }}
          PROBE_TEAM: ${{ secrets.PROBE_TEAM }}
        run: node probe-vs-hosted.mjs | tee /tmp/savings.txt
      - name: Publish run summary
        if: steps.gate.outputs.present == 'true'
        run: |
          {
            echo "### Savings vs the hosted Linear MCP"
            echo '```text'
            cat /tmp/savings.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Regression check
        if: steps.gate.outputs.present == 'true'
        run: |
          agg=$(grep -o 'aggregate save=[0-9.]*' /tmp/savings.txt | cut -d= -f2)
          if [ -z "$agg" ]; then
            echo "FAIL: could not parse aggregate save% from probe output"
            exit 1
          fi
          echo "aggregate save: ${agg}% (floor: ${SAVINGS_FLOOR}%)"
          if ! awk -v a="$agg" -v f="$SAVINGS_FLOOR" 'BEGIN { exit (a + 0 >= f + 0) ? 0 : 1 }'; then
            echo "FAIL: aggregate savings ${agg}% fell below the ${SAVINGS_FLOOR}% floor — trim regression"
            exit 1
          fi
